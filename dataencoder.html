<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>b64</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    gap: 24px;
  }
  h1 { font-size: 13px; letter-spacing: .4em; color: #555; text-transform: uppercase; }
  .card {
    width: 100%;
    max-width: 560px;
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .label { font-size: 10px; letter-spacing: .2em; color: #555; text-transform: uppercase; }
  textarea {
    width: 100%;
    height: 90px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: #ffb347; }
  .arrow { text-align: center; font-size: 18px; color: #333; }
  .out-row { display: flex; gap: 8px; align-items: stretch; }
  .out-row textarea { flex: 1; height: 90px; color: #ffb347; cursor: pointer; }
  .copy-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    padding: 0 14px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  .copy-btn:hover { border-color: #ffb347; color: #ffb347; }
  .copy-btn.copied { border-color: #6fcf6f; color: #6fcf6f; }
  .divider { border: none; border-top: 1px solid #1e1e1e; margin: 4px 0; }
  .dir-row { display: flex; gap: 8px; }
  .dir-btn {
    flex: 1;
    padding: 9px;
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color .15s, color .15s, background .15s;
  }
  .dir-btn.active, .dir-btn:hover { border-color: #ffb347; color: #ffb347; }
  .dir-btn.active { background: rgba(255,179,71,.07); }
</style>
</head>
<body>

<h1>b64 encoder / decoder</h1>

<div class="card">
  <div class="label">Input</div>
  <textarea id="input" placeholder="paste anything here..."></textarea>

  <div class="dir-row">
    <button class="dir-btn active" id="btnEncode">⬆ Encode</button>
    <button class="dir-btn"        id="btnDecode">⬇ Decode</button>
  </div>

  <hr class="divider">

  <div class="label" id="outLabel">Output — base64</div>
  <div class="out-row">
    <textarea id="output" readonly placeholder="output appears here..."></textarea>
    <button class="copy-btn" id="copyBtn">COPY</button>
  </div>
</div>

<script>
  const input   = document.getElementById('input');
  const output  = document.getElementById('output');
  const copyBtn = document.getElementById('copyBtn');
  const outLbl  = document.getElementById('outLabel');
  const btnEnc  = document.getElementById('btnEncode');
  const btnDec  = document.getElementById('btnDecode');

  let mode = 'encode';

  function run() {
    const val = input.value;
    if (!val) { output.value = ''; return; }
    try {
      output.value = mode === 'encode' ? btoa(unescape(encodeURIComponent(val))) : decodeURIComponent(escape(atob(val)));
    } catch {
      output.value = '— invalid input —';
    }
  }

  function setMode(m) {
    mode = m;
    btnEnc.classList.toggle('active', m === 'encode');
    btnDec.classList.toggle('active', m === 'decode');
    outLbl.textContent = m === 'encode' ? 'Output — base64' : 'Output — decoded';
    run();
  }

  input.addEventListener('input', run);
  btnEnc.addEventListener('click', () => setMode('encode'));
  btnDec.addEventListener('click', () => setMode('decode'));

  copyBtn.addEventListener('click', () => {
    if (!output.value || output.value === '— invalid input —') return;
    navigator.clipboard.writeText(output.value).then(() => {
      copyBtn.textContent = 'COPIED';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'COPY'; copyBtn.classList.remove('copied'); }, 1500);
    });
  });

  output.addEventListener('click', () => output.select());
</script>
</body>
</html>
